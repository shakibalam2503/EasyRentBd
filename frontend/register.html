<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyRentBD - Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom styles for icons */
        .icon {
            width: 16px;
            height: 16px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .icon-large {
            width: 24px;
            height: 24px;
        }

        /* Loading spinner */
        .spinner {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #3498db;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Custom button and input styles */
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            transition: all 0.2s;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
            transform: translateY(-1px);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .input-field {
            transition: all 0.2s;
        }

        .input-field:focus {
            outline: none;
            ring: 2px solid #3b82f6;
            border-color: #3b82f6;
        }

        .card {
            background: white;
            border-radius: 12px;
            border: 1px solid #e5e7eb;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .alert-error {
            background-color: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
        }

        /* Password toggle */
        .password-toggle {
            cursor: pointer;
            transition: color 0.2s;
        }

        .password-toggle:hover {
            color: #374151;
        }

        /* Custom select dropdown */
        .custom-select {
            appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='m6 8 4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.5rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
            padding-right: 2.5rem;
        }

        /* Progress bar */
        .progress-bar {
            width: 100%;
            height: 8px;
            background-color: #f3f4f6;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            transition: width 0.3s ease;
            border-radius: 4px;
        }
    </style>
</head>
<body class="bg-gray-50">
    <div class="min-h-screen flex items-center justify-center py-12 px-4">
        <div class="w-full max-w-md space-y-8">
            <!-- Logo and Header -->
            <div class="text-center">
                <a href="/" class="inline-flex items-center space-x-2 mb-6">
                    <div class="w-10 h-10 bg-gradient-to-r from-blue-600 to-purple-600 rounded-lg flex items-center justify-center">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
                        </svg>
                    </div>
                    <span class="text-2xl font-bold text-gray-900">EasyRentBD</span>
                </a>
                <h2 class="text-3xl font-bold text-gray-900">Create your account</h2>
                <p class="mt-2 text-gray-600">Join thousands of users finding their perfect rental</p>
            </div>

            <!-- Registration Card -->
            <div class="card">
                <div class="px-6 py-4 border-b border-gray-200">
                    <h3 class="text-lg font-semibold text-gray-900">Sign Up</h3>
                    <p class="text-sm text-gray-600 mt-1">Enter your information below to create your account</p>
                </div>

                <div class="p-6 space-y-6">
                    <!-- Error Alert -->
                    <div id="error-alert" class="alert-error hidden">
                        <span id="error-message"></span>
                    </div>

                    <!-- Registration Form -->
                    <form id="register-form" class="space-y-4">
                        <!-- Full Name Field -->
                        <div class="space-y-2">
                            <label for="name" class="block text-sm font-medium text-gray-700">Full Name</label>
                            <div class="relative">
                                <svg class="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                                </svg>
                                <input
                                    id="name"
                                    type="text"
                                    placeholder="Enter your full name"
                                    class="input-field w-full pl-10 pr-4 py-2 border border-gray-300 rounded-md"
                                    required
                                />
                            </div>
                        </div>

                        <!-- Email Field -->
                        <div class="space-y-2">
                            <label for="email" class="block text-sm font-medium text-gray-700">Email address</label>
                            <div class="relative">
                                <svg class="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"></path>
                                </svg>
                                <input
                                    id="email"
                                    type="email"
                                    placeholder="Enter your email"
                                    class="input-field w-full pl-10 pr-4 py-2 border border-gray-300 rounded-md"
                                    required
                                />
                            </div>
                        </div>

                        <!-- Phone Field -->
                        <div class="space-y-2">
                            <label for="phone" class="block text-sm font-medium text-gray-700">Phone Number</label>
                            <div class="relative">
                                <svg class="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path>
                                </svg>
                                <input
                                    id="phone"
                                    type="tel"
                                    placeholder="Enter your phone number"
                                    class="input-field w-full pl-10 pr-4 py-2 border border-gray-300 rounded-md"
                                    required
                                />
                            </div>
                        </div>

                        <!-- Role Selection -->
                        <div class="space-y-2">
                            <label for="role" class="block text-sm font-medium text-gray-700">I am a</label>
                            <select
                                id="role"
                                class="custom-select input-field w-full px-4 py-2 border border-gray-300 rounded-md"
                                required
                            >
                                <option value="">Select your role</option>
                                <option value="tenant">Tenant (Looking for rental)</option>
                                <option value="owner">Property Owner (Listing properties)</option>
                            </select>
                        </div>

                        <!-- Password Field -->
                        <div class="space-y-2">
                            <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
                            <div class="relative">
                                <svg class="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                                </svg>
                                <input
                                    id="password"
                                    type="password"
                                    placeholder="Create a password"
                                    class="input-field w-full pl-10 pr-10 py-2 border border-gray-300 rounded-md"
                                    required
                                />
                                <button
                                    type="button"
                                    id="toggle-password"
                                    class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 password-toggle"
                                >
                                    <svg id="eye-closed-1" class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                                    </svg>
                                    <svg id="eye-open-1" class="icon hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.878 9.878L3 3m6.878 6.878L21 21"></path>
                                    </svg>
                                </button>
                            </div>
                            <!-- Password Strength Indicator -->
                            <div id="password-strength" class="space-y-2 hidden">
                                <div class="flex justify-between text-xs">
                                    <span>Password strength</span>
                                    <span id="strength-text" class="text-red-500">Weak</span>
                                </div>
                                <div class="progress-bar">
                                    <div id="strength-bar" class="progress-fill bg-red-500" style="width: 0%"></div>
                                </div>
                            </div>
                        </div>

                        <!-- Confirm Password Field -->
                        <div class="space-y-2">
                            <label for="confirmPassword" class="block text-sm font-medium text-gray-700">Confirm Password</label>
                            <div class="relative">
                                <svg class="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                                </svg>
                                <input
                                    id="confirmPassword"
                                    type="password"
                                    placeholder="Confirm your password"
                                    class="input-field w-full pl-10 pr-10 py-2 border border-gray-300 rounded-md"
                                    required
                                />
                                <button
                                    type="button"
                                    id="toggle-confirm-password"
                                    class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 password-toggle"
                                >
                                    <svg id="eye-closed-2" class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                                    </svg>
                                    <svg id="eye-open-2" class="icon hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.878 9.878L3 3m6.878 6.878L21 21"></path>
                                    </svg>
                                </button>
                            </div>
                        </div>

                        <!-- Terms and Conditions -->
                        <div class="flex items-start space-x-2">
                            <input
                                type="checkbox"
                                id="terms"
                                class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded focus:ring-blue-500 mt-0.5"
                            />
                            <label for="terms" class="text-sm text-gray-600">
                                I agree to the
                                <a href="/terms" class="text-blue-600 hover:underline">Terms of Service</a>
                                and
                                <a href="/privacy" class="text-blue-600 hover:underline">Privacy Policy</a>
                            </label>
                        </div>

                        <!-- Submit Button -->
                        <button
                            type="submit"
                            id="register-btn"
                            class="btn-primary w-full text-white font-medium py-2 px-4 rounded-md"
                        >
                            Create Account
                        </button>
                    </form>

                    <!-- Separator -->
                    <div class="relative">
                        <div class="absolute inset-0 flex items-center">
                            <div class="w-full border-t border-gray-300"></div>
                        </div>
                        <div class="relative flex justify-center text-xs uppercase">
                            <span class="bg-white px-2 text-gray-500">Or sign up with</span>
                        </div>
                    </div>

                    <!-- Social Registration Buttons -->
                    <div class="grid grid-cols-2 gap-3">
                        <button
                            id="google-register"
                            class="w-full flex items-center justify-center px-4 py-2 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 transition-colors"
                        >
                            <svg class="w-5 h-5 mr-2" viewBox="0 0 24 24">
                                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                            </svg>
                            Google
                        </button>
                        <button
                            id="facebook-register"
                            class="w-full flex items-center justify-center px-4 py-2 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 transition-colors"
                        >
                            <svg class="w-5 h-5 mr-2" fill="#1877F2" viewBox="0 0 24 24">
                                <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                            </svg>
                            Facebook
                        </button>
                    </div>

                    <!-- Sign In Link -->
                    <div class="text-center">
                        <p class="text-sm text-gray-600">
                            Already have an account?
                            <a href="login.html" class="text-blue-600 hover:underline font-medium">Sign in</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // State management
        let formState = {
            name: '',
            email: '',
            phone: '',
            password: '',
            confirmPassword: '',
            role: '',
            showPassword: false,
            showConfirmPassword: false,
            agreeToTerms: false,
            error: '',
            isLoading: false
        };

        // DOM elements
        const nameInput = document.getElementById('name');
        const emailInput = document.getElementById('email');
        const phoneInput = document.getElementById('phone');
        const roleSelect = document.getElementById('role');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const togglePasswordBtn = document.getElementById('toggle-password');
        const toggleConfirmPasswordBtn = document.getElementById('toggle-confirm-password');
        const termsCheckbox = document.getElementById('terms');
        const registerForm = document.getElementById('register-form');
        const registerBtn = document.getElementById('register-btn');
        const errorAlert = document.getElementById('error-alert');
        const errorMessage = document.getElementById('error-message');
        const passwordStrengthDiv = document.getElementById('password-strength');
        const strengthText = document.getElementById('strength-text');
        const strengthBar = document.getElementById('strength-bar');
        const googleRegisterBtn = document.getElementById('google-register');
        const facebookRegisterBtn = document.getElementById('facebook-register');

        // Eye icons
        const eyeClosed1 = document.getElementById('eye-closed-1');
        const eyeOpen1 = document.getElementById('eye-open-1');
        const eyeClosed2 = document.getElementById('eye-closed-2');
        const eyeOpen2 = document.getElementById('eye-open-2');

        // Event listeners
        nameInput.addEventListener('input', (e) => {
            formState.name = e.target.value;
        });

        emailInput.addEventListener('input', (e) => {
            formState.email = e.target.value;
        });

        phoneInput.addEventListener('input', (e) => {
            formState.phone = e.target.value;
        });

        roleSelect.addEventListener('change', (e) => {
            formState.role = e.target.value;
        });

        passwordInput.addEventListener('input', (e) => {
            formState.password = e.target.value;
            updatePasswordStrength();
        });

        confirmPasswordInput.addEventListener('input', (e) => {
            formState.confirmPassword = e.target.value;
        });

        termsCheckbox.addEventListener('change', (e) => {
            formState.agreeToTerms = e.target.checked;
        });

        togglePasswordBtn.addEventListener('click', () => {
            formState.showPassword = !formState.showPassword;
            updatePasswordVisibility();
        });

        toggleConfirmPasswordBtn.addEventListener('click', () => {
            formState.showConfirmPassword = !formState.showConfirmPassword;
            updateConfirmPasswordVisibility();
        });

        registerForm.addEventListener('submit', handleSubmit);
        googleRegisterBtn.addEventListener('click', () => handleSocialRegister('google'));
        facebookRegisterBtn.addEventListener('click', () => handleSocialRegister('facebook'));

        // Functions
        function getPasswordStrength(password) {
            let strength = 0;
            if (password.length >= 8) strength += 25;
            if (/[A-Z]/.test(password)) strength += 25;
            if (/[a-z]/.test(password)) strength += 25;
            if (/[0-9]/.test(password)) strength += 25;
            return strength;
        }

        function updatePasswordStrength() {
            const strength = getPasswordStrength(formState.password);

            if (formState.password) {
                passwordStrengthDiv.classList.remove('hidden');
                strengthBar.style.width = strength + '%';

                if (strength < 50) {
                    strengthText.textContent = 'Weak';
                    strengthText.className = 'text-red-500';
                    strengthBar.className = 'progress-fill bg-red-500';
                } else if (strength < 75) {
                    strengthText.textContent = 'Medium';
                    strengthText.className = 'text-yellow-500';
                    strengthBar.className = 'progress-fill bg-yellow-500';
                } else {
                    strengthText.textContent = 'Strong';
                    strengthText.className = 'text-green-500';
                    strengthBar.className = 'progress-fill bg-green-500';
                }
            } else {
                passwordStrengthDiv.classList.add('hidden');
            }
        }

        function updatePasswordVisibility() {
            passwordInput.type = formState.showPassword ? 'text' : 'password';
            if (formState.showPassword) {
                eyeClosed1.classList.add('hidden');
                eyeOpen1.classList.remove('hidden');
            } else {
                eyeClosed1.classList.remove('hidden');
                eyeOpen1.classList.add('hidden');
            }
        }

        function updateConfirmPasswordVisibility() {
            confirmPasswordInput.type = formState.showConfirmPassword ? 'text' : 'password';
            if (formState.showConfirmPassword) {
                eyeClosed2.classList.add('hidden');
                eyeOpen2.classList.remove('hidden');
            } else {
                eyeClosed2.classList.remove('hidden');
                eyeOpen2.classList.add('hidden');
            }
        }

        function showError(message) {
            formState.error = message;
            errorMessage.textContent = message;
            errorAlert.classList.remove('hidden');
        }

        function hideError() {
            formState.error = '';
            errorAlert.classList.add('hidden');
        }

        function setLoading(loading) {
            formState.isLoading = loading;
            if (loading) {
                registerBtn.innerHTML = '<div class="spinner"></div>Creating account...';
                registerBtn.disabled = true;
            } else {
                registerBtn.innerHTML = 'Create Account';
                registerBtn.disabled = false;
            }
        }

        function handleSubmit(e) {
            e.preventDefault();
            hideError();

            // Validation
            if (formState.password !== formState.confirmPassword) {
                showError('Passwords do not match');
                return;
            }

            const passwordStrength = getPasswordStrength(formState.password);
            if (passwordStrength < 50) {
                showError('Password is too weak. Please use a stronger password.');
                return;
            }

            if (!formState.agreeToTerms) {
                showError('Please agree to the terms and conditions');
                return;
            }

            if (!formState.role) {
                showError('Please select your role');
                return;
            }

            setLoading(true);

            // Real API call
            fetch('http://localhost:5000/api/auth/register', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    name: formState.name,
                    email: formState.email,
                    phone: formState.phone,
                    role: formState.role,
                    password: formState.password,
                }),
            })
            .then(async res => {
                const data = await res.json();
                if (!res.ok) {
                    // If server responds with an error, throw it to be caught by the .catch block
                    throw new Error(data.message || 'Something went wrong');
                }
                return data;
            })
            .then(data => {
                onLogin(data.user, data.token);
            })
            .catch(error => {
                showError(error.message);
            })
            .finally(() => {
                setLoading(false);
            });
        }

        function handleSocialRegister(provider) {
            // This would be a redirect to the backend social login route
            // e.g., window.location.href = `http://localhost:5000/api/auth/${provider}`;
            alert(`Social login with ${provider} is not implemented in this demo.`);
        }

        function onLogin(user, token) {
            // Store user data and token in localStorage
            localStorage.setItem('currentUser', JSON.stringify(user));
            localStorage.setItem('token', token);

            // Show success message
            alert(`Welcome, ${user.name}! Your account has been created successfully. Role: ${user.role}`);

            // Redirect based on user role
            switch(user.role) {
                case 'owner':
                    window.location.href = './owner-dashboard.html'; // Corrected filename
                    break;
                case 'tenant':
                    window.location.href = './tenant-dashboard.html';
                    break;
                default:
                    window.location.href = './login.html';
            }
        }

        // Initialize form state
        document.addEventListener('DOMContentLoaded', () => {
            hideError();
            updatePasswordVisibility();
            updateConfirmPasswordVisibility();
        });
    </script>
</body>
